<form class="silver round-shadow gt-1rem">
                  <table class="w-100 border-table">
                    <tbody>
                    <tr>
                      <th class="fr7">Cash Required</th>
                      <th>$ 15,702,800</th>
                    </tr>
                    <tr>
                      <th>Experience Required</th>
                      <th>43,690xp</th>
                    </tr>
                    <tr>
                      <th>Reputation Avg.</th>
                      <th>{{ stats.averageRating() }}</th>
                    </tr>
                    <tr>
                      <th class="red-metal">Position</th>
                      <th><select name="position" id="playerPosition">
                        <option value="striker">Striker</option>
                        <option value="cmidfilder">C. Midfielder</option>
                        <option value="lmidfilder">L. Midfielder</option>
                        <option value="rmidfilder">R. Midfielder</option>
                        <option value="cdefender"> C. Defender</option>
                        <option value="ldefender">L. Defender</option>
                        <option value="rdefender">R. Defender</option>                        
                      </select></th>
                    </tr>
                   </tbody>
                  </table>
                  <table class="w-100 border-table date-table">
                  <thead>
                    <tr>
                      <th colspan="3">In-Game Date</th>
                    </tr>
                    <tr>
                      <th><select name="year" id="year" class="date-select" (change)="onYearChange($event)">
                        <option *ngFor="let y of years" [value]="y">{{y}}</option>
                      </select></th>
                      <th><select name="month" id="month" class="date-select" (change)="onMonthChange($event)">
                        <option *ngFor="let m of availableMonths" [value]="m.value" [selected]="m.value === selectedMonth">{{m.label}}</option>
                      </select></th>
                        <th><select name="" id="" class="date-select" (change)="onWeekChange($event)">
                          <option value="1">1st week</option>
                          <option value="2">2nd week</option>
                          <option value="3">3rd week</option>
                          <option value="4">4th week</option>
                        </select></th>
                    </tr>
                  </thead>
                  <tbody>              
                  </tbody>
                  </table>
                </form>
